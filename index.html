<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE 打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: #f5f6f8;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .box {
      max-width: 460px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    h1 {
      text-align: center;
      margin: 0 0 20px 0;
      font-size: 24px;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }
    .subTitle {
      text-align: center;
      color: #666;
      margin-top: -6px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .row {
      margin-bottom: 14px;
    }
    .label {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 15px;
    }
    .value {
      background: #f1f3f5;
      padding: 12px;
      border-radius: 10px;
      word-break: break-all;
      white-space: pre-line;
      min-height: 24px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    .small {
      font-size: 13px;
      color: #777;
      margin-top: 6px;
      line-height: 1.6;
    }
    .btns, .menuBtns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    button, .navBtn {
      padding: 14px 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      text-decoration: none;
      text-align: center;
      display: inline-block;
      box-sizing: border-box;
    }
    .btn-blue { background: #0d6efd; }
    .btn-green { background: #4f9560; }
    .btn-orange { background: #e0923f; }
    .btn-purple { background: #6c4bc8; }
    .btn-red { background: #cf5750; }
    .btn-gray { background: #727b86; }
    .msg {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      background: #eef3f8;
      white-space: pre-line;
      min-height: 24px;
      line-height: 1.6;
    }
    .loading {
      text-align: center;
      margin-top: 20px;
      color: #666;
      min-height: 20px;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>員工打卡系統</h1>
    <div class="subTitle" id="pageTitle">載入中...</div>

    <div class="row">
      <div class="label">LINE 名稱</div>
      <div class="value" id="displayName">讀取中...</div>
    </div>

    <div class="row">
      <div class="label">員工ID</div>
      <input type="text" id="empid" placeholder="請輸入員工ID，例如 YT001" />
      <div class="small">目前先沿用員工ID方式，等後端改好後再改成 LINE 綁定正式版。</div>
    </div>

    <!-- 正常打卡 -->
    <div id="page-clock" class="page">
      <h3>正常打卡區</h3>

      <div class="row">
        <div class="label">目前位置</div>
        <div class="value" id="locationText">尚未取得</div>
      </div>

      <div class="btns">
        <button class="btn-green" onclick="punch('上班')">上班</button>
        <button class="btn-orange" onclick="punch('午休開始')">午休開始</button>
        <button class="btn-purple" onclick="punch('午休結束')">午休結束</button>
        <button class="btn-red" onclick="punch('下班')">下班</button>
      </div>

      <div class="loading" id="loading"></div>
      <div class="msg" id="msg">系統初始化中...</div>
    </div>

    <!-- 補打卡 -->
    <div id="page-miss" class="page">
      <h3>補打卡申請區</h3>

      <div class="row">
        <div class="label">補卡日期</div>
        <input type="date" id="missDate" />
      </div>

      <div class="row">
        <div class="label">班別</div>
        <select id="missType">
          <option value="">請選擇</option>
          <option value="上班">上班</option>
          <option value="午休開始">午休開始</option>
          <option value="午休結束">午休結束</option>
          <option value="下班">下班</option>
        </select>
      </div>

      <div class="row">
        <div class="label">補卡時間</div>
        <input type="time" id="missTime" />
      </div>

      <div class="row">
        <div class="label">原因</div>
        <textarea id="missReason" placeholder="例如：手機沒電、忘記打卡、外出送貨未及操作"></textarea>
      </div>

      <button class="btn-blue" onclick="submitMiss()">送出補打卡申請</button>
      <div class="msg" id="missMsg">此頁面已切好，下一步接後端補打卡寫入。</div>
    </div>

    <!-- 月查詢 -->
    <div id="page-query" class="page">
      <h3>個人（月）出勤查詢區</h3>

      <div class="row">
        <div class="label">月份</div>
        <input type="text" id="queryMonth" placeholder="請輸入 202603" maxlength="6" />
        <div class="small">格式：YYYYMM，例如 202603</div>
      </div>

      <button class="btn-blue" onclick="queryAttendance()">查詢月紀錄</button>
      <div class="msg" id="queryMsg">此頁面已切好，下一步接後端月查詢。</div>
    </div>

    <!-- 請假 -->
    <div id="page-leave" class="page">
      <h3>請假申請區</h3>

      <div class="row">
        <div class="label">假別</div>
        <select id="leaveType">
          <option value="">請選擇</option>
          <option value="事假">事假</option>
          <option value="病假">病假</option>
          <option value="特休">特休</option>
          <option value="其他">其他</option>
        </select>
      </div>

      <div class="row">
        <div class="label">開始日期</div>
        <input type="date" id="leaveStart" />
      </div>

      <div class="row">
        <div class="label">結束日期</div>
        <input type="date" id="leaveEnd" />
      </div>

      <div class="row">
        <div class="label">原因</div>
        <textarea id="leaveReason" placeholder="請輸入請假原因"></textarea>
      </div>

      <button class="btn-blue" onclick="submitLeave()">送出請假申請</button>
      <div class="msg" id="leaveMsg">此頁面已切好，下一步接後端請假申請。</div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009482137-QgqJEHgA";
    const API_URL = "https://script.google.com/macros/s/AKfycbwy2JqPSxzHZQXc6CClkNenuIK5-Ny9ouqjUWj3yCJPBlTSDYQd7ZNMkrUDsnJd3QyRbQ/exec";

    let profileName = "";
    let userLat = null;
    let userLng = null;
    let currentPage = "clock";

    function getPage() {
      const params = new URLSearchParams(window.location.search);
      return params.get("page") || "clock";
    }

    function showPage(page) {
      currentPage = page;
      document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));

      const pageMap = {
        clock: "page-clock",
        miss: "page-miss",
        query: "page-query",
        leave: "page-leave"
      };

      const titleMap = {
        clock: "正常打卡",
        miss: "補打卡申請",
        query: "個人月查詢",
        leave: "請假申請"
      };

      const target = pageMap[page] || "page-clock";
      document.getElementById(target).classList.add("active");
      document.getElementById("pageTitle").innerText = titleMap[page] || "正常打卡";
    }

    function setLoading(text) {
      const el = document.getElementById("loading");
      if (el) el.innerText = text || "";
    }

    function setMsg(text) {
      const el = document.getElementById("msg");
      if (el) el.innerText = text || "";
    }

    function setMissMsg(text) {
      document.getElementById("missMsg").innerText = text || "";
    }

    function setQueryMsg(text) {
      document.getElementById("queryMsg").innerText = text || "";
    }

    function setLeaveMsg(text) {
      document.getElementById("leaveMsg").innerText = text || "";
    }

    function getErrorMessage(err) {
      if (!err) return "未知錯誤";
      return err.message || String(err);
    }

    async function initApp() {
      try {
        showPage(getPage());

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        profileName = profile.displayName || "";
        document.getElementById("displayName").innerText = profileName || "未取得";

        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, "0");
        document.getElementById("queryMonth").value = `${y}${m}`;

        if (currentPage === "clock") {
          setLoading("定位中...");
          setMsg("正在取得 GPS 位置...");
          getLocation();
        }

      } catch (err) {
        setLoading("");
        setMsg("LIFF 初始化失敗：" + getErrorMessage(err));
      }
    }

    function getLocation() {
      if (!navigator.geolocation) {
        setLoading("");
        document.getElementById("locationText").innerText = "此裝置不支援定位";
        setMsg("此裝置不支援定位功能。");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          userLat = position.coords.latitude;
          userLng = position.coords.longitude;
          setLoading("");
          document.getElementById("locationText").innerText =
            "緯度：" + userLat + "\n經度：" + userLng;
          setMsg("定位成功，請輸入員工ID後再按打卡。");
        },
        function(error) {
          setLoading("");
          document.getElementById("locationText").innerText = "定位失敗";

          let msg = "無法取得 GPS，請確認已開啟定位權限。";
          if (error && error.code === 1) msg = "你已拒絕定位權限，請到手機設定重新允許定位。";
          if (error && error.code === 2) msg = "無法取得定位資訊，請確認 GPS 或網路是否正常。";
          if (error && error.code === 3) msg = "定位逾時，請重新整理頁面後再試。";

          setMsg(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    async function punch(type) {
      const empid = document.getElementById("empid").value.trim();

      if (!empid) {
        setMsg("請先輸入員工ID");
        return;
      }

      if (userLat === null || userLng === null) {
        setMsg("尚未取得 GPS，請稍候，或重新整理頁面後再試。");
        getLocation();
        return;
      }

      setLoading("送出打卡中...");
      setMsg("");

      const payload = {
        empid: empid,
        name: profileName,
        type: type,
        lat: userLat,
        lng: userLng
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const rawText = await res.text();
        let result;

        try {
          result = JSON.parse(rawText);
        } catch (parseErr) {
          throw new Error("API 回傳不是 JSON：" + rawText);
        }

        setLoading("");

        if (result.ok) {
          setMsg(
            "✅ " + result.message + "\n" +
            "姓名：" + (result.name || "") + "\n" +
            "公司：" + (result.company || "") + "\n" +
            "類型：" + (result.type || "") + "\n" +
            "時間：" + (result.time || "") + "\n" +
            "距離：" + (result.distance || 0) + " 公尺"
          );
        } else {
          setMsg("❌ " + (result.message || "打卡失敗"));
        }

      } catch (err) {
        setLoading("");
        setMsg("送出失敗：" + getErrorMessage(err));
      }
    }

    function submitMiss() {
      const empid = document.getElementById("empid").value.trim();
      const date = document.getElementById("missDate").value;
      const type = document.getElementById("missType").value;
      const time = document.getElementById("missTime").value;
      const reason = document.getElementById("missReason").value.trim();

      if (!empid) {
        setMissMsg("請先輸入員工ID");
        return;
      }
      if (!date || !type || !time || !reason) {
        setMissMsg("請完整填寫補打卡資料。");
        return;
      }

      setMissMsg("頁面已正確切換，下一步我幫你接 GAS 寫入補打卡申請。");
    }

    function queryAttendance() {
      const empid = document.getElementById("empid").value.trim();
      const month = document.getElementById("queryMonth").value.trim();

      if (!empid) {
        setQueryMsg("請先輸入員工ID");
        return;
      }
      if (!/^[0-9]{6}$/.test(month)) {
        setQueryMsg("月份格式錯誤，請輸入 202603 這種格式。");
        return;
      }

      setQueryMsg("頁面已正確切換，下一步我幫你接 GAS 月查詢。");
    }

    function submitLeave() {
      const empid = document.getElementById("empid").value.trim();
      const type = document.getElementById("leaveType").value;
      const start = document.getElementById("leaveStart").value;
      const end = document.getElementById("leaveEnd").value;
      const reason = document.getElementById("leaveReason").value.trim();

      if (!empid) {
        setLeaveMsg("請先輸入員工ID");
        return;
      }
      if (!type || !start || !end || !reason) {
        setLeaveMsg("請完整填寫請假資料。");
        return;
      }

      setLeaveMsg("頁面已正確切換，下一步我幫你接 GAS 請假申請。");
    }

    initApp();
  </script>
</body>
</html>
