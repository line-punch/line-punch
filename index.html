<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE 打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: #f5f6f8;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .box {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
    }
    .row {
      margin-bottom: 12px;
    }
    .label {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .value {
      background: #f1f3f5;
      padding: 10px;
      border-radius: 10px;
      word-break: break-all;
      white-space: pre-line;
    }
    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    button {
      padding: 14px 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: #0d6efd;
      color: white;
    }
    button:hover {
      opacity: 0.9;
    }
    .msg {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      background: #eef6ff;
      white-space: pre-line;
      min-height: 24px;
    }
    .loading {
      text-align: center;
      margin-top: 20px;
      color: #666;
      min-height: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }
    .small {
      font-size: 13px;
      color: #777;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>LINE 打卡系統</h2>

    <div class="row">
      <div class="label">LINE 名稱</div>
      <div class="value" id="displayName">讀取中...</div>
    </div>

    <div class="row">
      <div class="label">員工ID</div>
      <input type="text" id="empid" placeholder="請輸入員工ID，例如 YT001" />
      <div class="small">第一次使用請輸入員工ID，之後可固定由你們內部再優化成綁定版</div>
    </div>

    <div class="row">
      <div class="label">目前位置</div>
      <div class="value" id="locationText">尚未取得</div>
    </div>

    <div class="btns">
      <button onclick="punch('上班')">上班</button>
      <button onclick="punch('午休開始')">午休開始</button>
      <button onclick="punch('午休結束')">午休結束</button>
      <button onclick="punch('下班')">下班</button>
    </div>

    <div class="loading" id="loading"></div>
    <div class="msg" id="msg">系統初始化中...</div>
  </div>

  <script>
    const LIFF_ID = "2009482137-QgqJEHgA";
    const API_URL = "https://script.google.com/macros/s/AKfycbwy2JqPSxzHZQXc6CClkNenuIK5-Ny9ouqjUWj3yCJPBlTSDYQd7ZNMkrUDsnJd3QyRbQ/exec";

    let profileName = "";
    let userLat = null;
    let userLng = null;

    async function initApp() {
      try {
        setLoading("LIFF 初始化中...");
        setMsg("請稍候，正在登入與取得資料...");

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        profileName = profile.displayName || "";
        document.getElementById("displayName").innerText = profileName || "未取得";

        setLoading("定位中...");
        setMsg("正在取得 GPS 位置...");
        getLocation();
      } catch (err) {
        setLoading("");
        setMsg("LIFF 初始化失敗：" + getErrorMessage(err));
      }
    }

    function setLoading(text) {
      document.getElementById("loading").innerText = text || "";
    }

    function setMsg(text) {
      document.getElementById("msg").innerText = text || "";
    }

    function getErrorMessage(err) {
      if (!err) return "未知錯誤";
      return err.message || String(err);
    }

    function getLocation() {
      if (!navigator.geolocation) {
        setLoading("");
        document.getElementById("locationText").innerText = "此裝置不支援定位";
        setMsg("此裝置不支援定位功能。");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          userLat = position.coords.latitude;
          userLng = position.coords.longitude;

          setLoading("");
          document.getElementById("locationText").innerText =
            "緯度：" + userLat + "\n經度：" + userLng;

          setMsg("定位成功，請輸入員工ID後再按打卡。");
        },
        function(error) {
          setLoading("");
          document.getElementById("locationText").innerText = "定位失敗";

          let msg = "無法取得 GPS，請確認已開啟定位權限。";
          if (error && error.code === 1) msg = "你已拒絕定位權限，請到手機設定重新允許定位。";
          if (error && error.code === 2) msg = "無法取得定位資訊，請確認 GPS 或網路是否正常。";
          if (error && error.code === 3) msg = "定位逾時，請重新整理頁面後再試。";

          setMsg(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    async function punch(type) {
      const empid = document.getElementById("empid").value.trim();

      if (!empid) {
        setMsg("請先輸入員工ID");
        return;
      }

      if (userLat === null || userLng === null) {
        setMsg("尚未取得 GPS，請稍候，或重新整理頁面後再試。");
        getLocation();
        return;
      }

      setLoading("送出打卡中...");
      setMsg("");

      const payload = {
        empid: empid,
        name: profileName,
        type: type,
        lat: userLat,
        lng: userLng
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const rawText = await res.text();

        let result;
        try {
          result = JSON.parse(rawText);
        } catch (parseErr) {
          throw new Error("API 回傳不是 JSON：" + rawText);
        }

        setLoading("");

        if (result.ok) {
          setMsg(
            "✅ " + result.message + "\n" +
            "姓名：" + (result.name || "") + "\n" +
            "公司：" + (result.company || "") + "\n" +
            "類型：" + (result.type || "") + "\n" +
            "時間：" + (result.time || "") + "\n" +
            "距離：" + (result.distance || 0) + " 公尺"
          );
        } else {
          setMsg("❌ " + (result.message || "打卡失敗"));
        }

      } catch (err) {
        setLoading("");
        setMsg("送出失敗：" + getErrorMessage(err));
      }
    }

    initApp();
  </script>
</body>
</html>
